services:
    php:
        build: docker/php
        volumes:
            - '.:/var/www/app'
            - './docker/php/conf.d/xdebug.ini:/etc/php.d/xdebug.ini'
            - './docker/php/conf.d/error_reporting.ini:/etc/php.d/error_reporting.ini'
        expose:
            - 8080
        ports:
            - 8080:8080
        extra_hosts:
            - "host.docker.internal:host-gateway"
        restart: unless-stopped
        depends_on:
            - postgres
        
    postgres:
        build: docker/database/postgres
        command: postgres -c max_connections=200
        ports:
            - 5432:5432
        volumes:
            - ./test/integration/TestFixtures/pgsql.sql:/docker-entrypoint-initdb.d/pgsql.sql
        environment:
            - POSTGRES_DB=${POSTGRES_DB:-phpdb_test}
            - POSTGRES_USER=${POSTGRES_USER:-postgres}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
        healthcheck:
            test: ["CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-phpdb_test}'"]
            interval: 30s
            timeout: 60s
            retries: 5
            start_period: 80s